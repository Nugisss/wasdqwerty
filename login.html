<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk | Monitoring IoT</title>
  <style>
    /* ===== CSS VARIABLES (dari style.css) ===== */
    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --danger: #ef4444;
      --success: #22c55e;
      --text: #1e293b;
      --text-soft: #64748b;
      --border: #e2e8f0;
      --gradient: linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
    }

    /* ===== LOGIN CSS (dari login.css) ===== */
    .login-body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(1000px 500px at 10% 10%, rgba(124,58,237,.18), transparent 60%),
        radial-gradient(900px 500px at 90% 90%, rgba(6,182,212,.16), transparent 60%),
        #0b1020;
      padding: 24px;
    }
    .login-wrapper {
      width: 100%; max-width: 980px;
      display: grid; grid-template-columns: 1fr 1fr;
      background: #fff;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.45);
    }
    .login-card { padding: 48px 44px; }
    .login-brand { text-align: center; margin-bottom: 32px; }
    .login-brand img { width: 48px; height: 48px; margin: 0 auto 12px; }
    .login-brand h1 { font-size: 24px; font-weight: 800; letter-spacing: -.01em; }
    .login-brand p { color: var(--text-soft); font-size: 14px; margin-top: 6px; }
    .login-form .form-group { margin-bottom: 18px; }
    .login-form label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .login-form input[type="email"],
    .login-form input[type="password"],
    .login-form input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      transition: border .15s ease, box-shadow .15s ease;
      outline: none;
      background: #fafbfd;
      font-family: inherit;
    }
    .login-form input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79,70,229,.12);
      background: #fff;
    }
    .form-row {
      display: flex; align-items: center; justify-content: space-between;
      margin: 8px 0 20px;
    }
    .checkbox { font-size: 13px; color: var(--text-soft); display: flex; align-items: center; gap: 6px; }
    .link { color: var(--primary); font-size: 13px; font-weight: 600; }
    .link:hover { text-decoration: underline; }
    .form-message { margin-top: 14px; font-size: 13px; text-align: center; min-height: 18px; }
    .form-message.error { color: var(--danger); }
    .form-message.success { color: var(--success); }
    .form-footer { margin-top: 22px; text-align: center; font-size: 13px; color: var(--text-soft); }
    .login-art {
      position: relative;
      background: var(--gradient);
      color: #fff;
      display: grid; place-items: center;
      padding: 48px;
      overflow: hidden;
    }
    .login-art::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(400px 200px at 80% 20%, rgba(255,255,255,.25), transparent 60%);
    }
    .art-content { position: relative; z-index: 1; text-align: center; max-width: 320px; }
    .art-content h2 { font-size: 32px; font-weight: 800; line-height: 1.15; }
    .art-content p { margin-top: 12px; opacity: .9; font-size: 14px; }
    @media (max-width: 760px) {
      .login-wrapper { grid-template-columns: 1fr; max-width: 440px; }
      .login-art { display: none; }
      .login-card { padding: 36px 28px; }
    }

    /* ===== TOMBOL HIDE/SHOW PASSWORD ===== */
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .password-wrapper input {
      padding-right: 44px;
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-soft);
      padding: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
      transition: color 0.15s;
    }
    .toggle-password:hover { color: var(--primary); }
    .toggle-password svg { width: 17px; height: 17px; }

    /* Button */
    .btn { padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-size: 14px; font-family: inherit; font-weight: 700; transition: background 0.2s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-block { width: 100%; }
  </style>
</head>
<body class="login-body">

  <div class="login-wrapper">

    <!-- Kiri: Form -->
    <div class="login-card">
      <div class="login-brand">
        <img src="img/logo.png" alt="Logo" />
        <h1>Selamat Datang Kembali</h1>
        <p>Masuk untuk mengakses dashboard monitoring Anda</p>
      </div>

      <form id="loginForm" class="login-form">

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="nama@email.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••" required />
            <button type="button" id="togglePassword" class="toggle-password" aria-label="Tampilkan/sembunyikan password">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-row">
          <label class="checkbox">
            <input type="checkbox" /> Ingat saya
          </label>
          <a href="#" class="link">Lupa password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Masuk</button>
        <p id="loginMessage" class="form-message"></p>
        <p class="form-footer">Belum punya akun? <a href="#" class="link">Daftar di sini</a></p>

      </form>
    </div>

    <!-- Kanan: Art -->
    <div class="login-art">
      <div class="art-content">
        <h2>Monitoring <br/>Lebih Cerdas</h2>
        <p>Pantau seluruh sensor IoT Anda dalam satu dashboard yang elegan dan modern.</p>
      </div>
    </div>

  </div>

  <script type="module" src="js/auth.js"></script>
  <script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput  = document.getElementById('password');
    const eyeIcon        = document.getElementById('eyeIcon');
    const eyeOffIcon     = document.getElementById('eyeOffIcon');

    togglePassword.addEventListener('click', () => {
      const isHidden = passwordInput.type === 'password';
      passwordInput.type       = isHidden ? 'text'  : 'password';
      eyeIcon.style.display    = isHidden ? 'none'  : 'block';
      eyeOffIcon.style.display = isHidden ? 'block' : 'none';
    });
  </script>

</body>
</html>
